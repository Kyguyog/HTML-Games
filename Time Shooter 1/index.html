<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Time Shooter</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body class="dark">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo"><img src="logo.png"></div>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>
    <script>
      const hideFullScreenButton = "1";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/TimeGD.loader.js";
      const config = {
        dataUrl: buildUrl + "/TimeGD.data.unityweb",
        frameworkUrl: buildUrl + "/TimeGD.framework.js.unityweb",
        codeUrl: buildUrl + "/TimeGD.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "GoGoMan",
        productName: "Time Shooter",
        productVersion: "1.0",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');

      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      }
      canvas.style.background = "url('" + buildUrl + "/TimeGD.jpg') center / cover";
      loadingCover.style.display = "";

      const blobUrlsToRevoke = [];

      function base64ToBlobUrl(base64, mimeType) {
        const binary = atob(base64);
        const chunkSize = 32768;
        const chunks = [];
        for (let i = 0; i < binary.length; i += chunkSize) {
          const slice = binary.slice(i, i + chunkSize);
          const bytes = new Uint8Array(slice.length);
          for (let j = 0; j < slice.length; j++) {
            bytes[j] = slice.charCodeAt(j);
          }
          chunks.push(bytes);
        }
        const blobUrl = URL.createObjectURL(new Blob(chunks, { type: mimeType }));
        blobUrlsToRevoke.push(blobUrl);
        return blobUrl;
      }

      function revokeBlobUrls() {
        while (blobUrlsToRevoke.length) {
          URL.revokeObjectURL(blobUrlsToRevoke.pop());
        }
      }

      window.addEventListener("beforeunload", revokeBlobUrls);

      function startUnity() {
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          loadingCover.style.display = "none";
          if (canFullscreen) {
            if (!hideFullScreenButton) {
              fullscreenButton.style.display = "";
            }
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          alert(message);
          revokeBlobUrls();
        });
        };
        document.body.appendChild(script);
      }

      if (window.location.protocol === "file:") {
        const embeddedScript = document.createElement("script");
        embeddedScript.src = buildUrl + "/TimeGD.embedded.js";
        embeddedScript.onload = () => {
          const embedded = window.__TIMEGD_EMBEDDED__;
          if (!embedded) {
            alert("Offline assets are missing. Keep Build/TimeGD.embedded.js next to index.html.");
            return;
          }
          config.dataUrl = base64ToBlobUrl(embedded.dataBase64, "application/octet-stream");
          config.frameworkUrl = base64ToBlobUrl(embedded.frameworkBase64, "application/javascript");
          config.codeUrl = base64ToBlobUrl(embedded.codeBase64, "application/wasm");
          startUnity();
        };
        embeddedScript.onerror = () => {
          alert("Could not load Build/TimeGD.embedded.js for offline mode.");
        };
        document.body.appendChild(embeddedScript);
      } else {
        startUnity();
      }
    </script>
  </body>
</html>
